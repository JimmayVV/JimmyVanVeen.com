[build]
command = "npm run build"
publish = "build/client"

# Node version lives solely in .nvmrc (Netlify reads it), which also fixes the
# bundled npm. No NODE_VERSION here on purpose — one source of truth.

[dev]
command = "npm run dev"
framework = "vite"

# Set immutable caching for static files, because they have fingerprinted filenames

[[headers]]
for = "/assets/*"
[headers.values]
"Cache-Control" = "public, max-age=31560000, immutable"
