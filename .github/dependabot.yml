version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
      lint-format:
        patterns:
          - "oxlint*"
          - "oxfmt*"
          - "@types/*"
          - "typescript*"
      build-tools:
        patterns:
          - "vite*"
          - "@react-router/*"
          - "react-router*"
          - "tailwindcss*"
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

      # @types/node tracks the Node version in .nvmrc (24). Skip non-LTS jumps.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
